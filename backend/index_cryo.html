<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion Cryo | Portal de Carga</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        header {
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        h1 { font-size: 36px; font-weight: 900; text-transform: uppercase; }
        h1 span { color: #3b82f6; }
        .subtitle { font-size: 18px; letter-spacing: 0.3em; margin-top: 5px; opacity: 0.9; }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            position: relative;
            overflow: visible;
        }
        .progress-fill {
            height: 100%;
            background: #3b82f6;
            transition: width 0.5s ease;
        }
        .content {
            padding: 30px;
        }
        .step-content { display: none; }
        .step-content.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-size: 13px;
            text-transform: uppercase;
            color: #3b82f6;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #3b82f6;
            background: rgba(59,130,246,0.1);
        }
        input[type="date"], input[type="time"] {
            font-size: 18px;
            padding: 14px 12px;
            cursor: pointer;
            color: white !important;
        }
        input[type="date"]::placeholder, input[type="time"]::placeholder {
            color: rgba(255,255,255,0.5);
        }
        /* Chrome, Safari */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1) brightness(1.2);
            cursor: pointer;
            width: 24px;
            height: 24px;
        }
        /* Select dropdown styling */
        select {
            font-size: 16px !important;
            color: white !important;
        }
        select option {
            background: #1e293b !important;
            color: white !important;
            padding: 10px;
        }
        select option:checked {
            background: #3b82f6 !important;
            color: white !important;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        .btn-next {
            flex: 1;
            background: #3b82f6;
            color: white;
        }
        .btn-next:hover { background: #2563eb; }
        .btn-back {
            flex: 0 0 30%;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .btn-back:hover { background: rgba(255,255,255,0.15); }
        .btn-submit {
            flex: 1;
            background: #10b981;
            color: white;
        }
        .btn-submit:hover { background: #059669; }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .section-box {
            border: 2px solid rgba(59,130,246,0.5);
            border-radius: 16px;
            padding: 15px;
            background: rgba(59,130,246,0.05);
            margin-bottom: 15px;
        }
        .section-origen {
            border: 2px solid rgba(34,197,94,0.6) !important;
            background: rgba(34,197,94,0.08) !important;
        }
        .section-origen .section-title {
            color: #22c55e !important;
        }
        .section-destino {
            border: 2px solid rgba(239,68,68,0.6) !important;
            background: rgba(239,68,68,0.08) !important;
        }
        .section-destino .section-title {
            color: #ef4444 !important;
        }
        .success-message {
            text-align: center;
            padding: 40px 20px;
        }
        .success-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .error {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.5);
            color: #fca5a5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        input.input-error, select.input-error, textarea.input-error {
            border-color: #ef4444 !important;
            background: rgba(239,68,68,0.1) !important;
        }
    </style>
</head>
<body>
    <!-- MODAL DE VALIDACIÓN -->
    <div id="modal-error" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center;">
        <div style="background: #1e293b; border: 2px solid #ef4444; border-radius: 20px; padding: 30px; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 48px; margin-bottom: 10px;">⚠️</div>
                <h2 style="font-size: 22px; color: #ef4444; font-weight: bold;">Campos Incompletos</h2>
            </div>
            <div id="modal-error-list" style="background: rgba(239,68,68,0.1); padding: 15px; border-radius: 12px; margin-bottom: 20px; max-height: 300px; overflow-y: auto;">
                <!-- Se llena dinámicamente con JavaScript -->
            </div>
            <button onclick="document.getElementById('modal-error').style.display='none'" style="width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer;">
                ✓ Entendido
            </button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>Orion <span>Cryo</span></h1>
            <p class="subtitle">Solicitud de Servicio</p>
        </header>

        <div style="padding: 20px 30px 0; text-align: center; font-size: 14px; font-weight: bold; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px;">
            <span id="step-indicator">Paso 1 de 4</span>
        </div>

        <div class="progress-bar" style="position: relative; margin-top: 40px;">
            <div class="progress-fill" id="progress" style="width: 10%"></div>
            <div id="truck-icon" style="position: absolute; left: 10%; top: -35px; font-size: 32px; transition: left 0.5s ease; transform: scaleX(-1);">🚛</div>
        </div>

        <div class="content">
            <div id="error" class="error"></div>

            <form id="form">
                <!-- STEP 1: Cliente -->
                <div id="step1" class="step-content active">
                    <div class="form-group">
                        <label>Empresa Cliente</label>
                        <input type="text" id="cliente">
                    </div>
                    <div class="form-group">
                        <label>Nombre Solicitante</label>
                        <input type="text" id="solicitante">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp de Contacto</label>
                        <input type="tel" id="telefono">
                    </div>
                    <div class="button-group">
                        <button type="button" class="btn-next" onclick="if(validarPaso(1)) goStep(2)">Siguiente: Ruta →</button>
                    </div>
                </div>

                <!-- STEP 2: Ruta -->
                <div id="step2" class="step-content">
                    <div class="form-group">
                        <p class="section-title">📍 Ruta Nacional</p>
                    </div>

                    <div class="section-box section-origen">
                        <p class="section-title">🟢 Origen</p>
                        <div class="form-group">
                            <label>Estado Origen</label>
                            <input type="text" id="origen" list="states-list">
                        </div>
                        <div class="form-group">
                            <label>Ciudad Origen</label>
                            <input type="text" id="cd_origen">
                        </div>
                    </div>

                    <div class="section-box section-destino">
                        <p class="section-title">🔴 Destino</p>
                        <div class="form-group">
                            <label>Estado Destino</label>
                            <input type="text" id="destino" list="states-list">
                        </div>
                        <div class="form-group">
                            <label>Ciudad Destino</label>
                            <input type="text" id="cd_destino">
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn-back" onclick="goStep(1)">← Atrás</button>
                        <button type="button" class="btn-next" onclick="if(validarPaso(2)) goStep(3)">Siguiente: Carga →</button>
                    </div>
                </div>

                <!-- STEP 3: Mercancía -->
                <div id="step3" class="step-content">
                    <div class="form-group">
                        <label>Mercancía</label>
                        <input type="text" id="mercancia">
                    </div>
                    <div class="form-group">
                        <label>Claves SAT (opcional)</label>
                        <input type="text" id="claves_sat">
                    </div>
                    <div class="form-group">
                        <label>Folios de Carga (opcional)</label>
                        <input type="text" id="folios_carga">
                    </div>
                    <div class="form-group">
                        <label>Peso (Toneladas)</label>
                        <input type="number" id="peso" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Temperatura Requerida</label>
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <button type="button" onclick="setTemp('C')" id="btn-c" style="flex:1; background: #3b82f6; color: white;">°C</button>
                            <button type="button" onclick="setTemp('F')" id="btn-f" style="flex:1; background: rgba(255,255,255,0.1); color: white;">°F</button>
                        </div>
                        <input type="range" id="temp" min="-20" max="20" value="-18" style="width: 100%;">
                        <p style="text-align: center; margin-top: 10px; font-size: 14px; color: #3b82f6;" id="tempDisplay">-18°C</p>
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn-back" onclick="goStep(2)">← Atrás</button>
                        <button type="button" class="btn-next" onclick="if(validarPaso(3)) goStep(4)">Siguiente: Detalles →</button>
                    </div>
                </div>

                <!-- STEP 4: Detalles Finales -->
                <div id="step4" class="step-content">
                    <div class="form-group">
                        <label>Fecha Carga</label>
                        <input type="date" id="fecha">
                    </div>
                    <div class="form-group">
                        <label>Hora Carga</label>
                        <input type="time" id="hora">
                    </div>
                    <div class="form-group">
                        <label>Fecha Descarga Esperada (opcional)</label>
                        <input type="date" id="fecha_descarga">
                    </div>
                    <div class="form-group">
                        <label>Hora Descarga Esperada (opcional)</label>
                        <input type="time" id="hora_descarga">
                    </div>
                    <div class="form-group">
                        <label>¿Tiene cita de descarga? (opcional)</label>
                        <input type="text" id="cita_descarga" placeholder="Ej: Sí, cita 14:00h">
                    </div>
                    <div class="form-group">
                        <label>Tipo de Unidad</label>
                        <select id="unidad" required>
                            <option>Refrigerado</option>
                            <option>Seco</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Dirección de Entrega</label>
                        <textarea id="direccion_entrega" style="resize: vertical; min-height: 80px;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Contacto en Destino (opcional)</label>
                        <input type="text" id="contacto_destino">
                    </div>
                    <div class="form-group">
                        <label>Teléfono Destino (opcional)</label>
                        <input type="tel" id="telefono_destino">
                    </div>
                    <div class="form-group">
                        <label>Solicitudes Adicionales / Notas</label>
                        <textarea id="observaciones" style="resize: vertical; min-height: 80px;"></textarea>
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn-back" onclick="goStep(3)">← Atrás</button>
                        <button type="submit" class="btn-submit">✓ Confirmar Solicitud</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <datalist id="states-list"></datalist>

    <script>
        // Estados de México
        const STATES = [
            "Aguascalientes", "Baja California", "Baja California Sur", "Campeche",
            "Chiapas", "Chihuahua", "Coahuila", "Colima", "CDMX", "Durango",
            "Guanajuato", "Guerrero", "Hidalgo", "Jalisco", "Estado de México",
            "Michoacán", "Morelos", "Nayarit", "Nuevo León", "Oaxaca", "Puebla",
            "Querétaro", "Quintana Roo", "San Luis Potosí", "Sinaloa", "Sonora",
            "Tabasco", "Tamaulipas", "Tlaxcala", "Veracruz", "Yucatán", "Zacatecas"
        ];

        // Llenar datalist de estados
        const statesList = document.getElementById('states-list');
        STATES.forEach(state => {
            const option = document.createElement('option');
            option.value = state;
            statesList.appendChild(option);
        });

        // Backend Orión (principal)
        const ORION_API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8000'
            : 'https://orion-mvp-524457029585.europe-west1.run.app';
        const ORION_API_URL = `${ORION_API}/api/solicitudes/altadeservicio`;

        let tempUnit = 'C';

        // Validación por paso
        function validarPaso(stepActual) {
            const camposRequeridosPorPaso = {
                1: [
                    { id: 'cliente', nombre: 'Empresa Cliente' },
                    { id: 'solicitante', nombre: 'Nombre Solicitante' },
                    { id: 'telefono', nombre: 'WhatsApp de Contacto' }
                ],
                2: [
                    { id: 'origen', nombre: 'Estado Origen' },
                    { id: 'destino', nombre: 'Estado Destino' }
                ],
                3: [
                    { id: 'mercancia', nombre: 'Tipo de Mercancía' },
                    { id: 'peso', nombre: 'Peso (Toneladas)' }
                ],
                4: [
                    { id: 'fecha', nombre: 'Fecha de Carga' },
                    { id: 'hora', nombre: 'Hora de Carga' },
                    { id: 'direccion_entrega', nombre: 'Dirección de Entrega' }
                ]
            };

            const camposAValidar = camposRequeridosPorPaso[stepActual] || [];
            const camposFaltantes = [];

            // Limpiar errores previos
            document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));

            // Validar campos del paso actual
            camposAValidar.forEach(campo => {
                const elemento = document.getElementById(campo.id);
                if (elemento) {
                    const valor = elemento.value.trim();
                    if (!valor) {
                        camposFaltantes.push(campo.nombre);
                        elemento.classList.add('input-error');
                    }
                }
            });

            // Si hay campos faltantes, mostrar modal
            if (camposFaltantes.length > 0) {
                const modalErrorList = document.getElementById('modal-error-list');
                modalErrorList.innerHTML = `
                    <div style="text-align: center; margin-bottom: 10px; color: #3b82f6; font-size: 14px;">
                        Paso ${stepActual} - Completa estos campos:
                    </div>
                ` + camposFaltantes
                    .map(campo => `<div style="padding: 8px 0; color: #fca5a5; font-size: 16px;">• ${campo}</div>`)
                    .join('');
                document.getElementById('modal-error').style.display = 'flex';
                return false;
            }

            return true;
        }

        function goStep(step) {
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');

            const progress = step === 1 ? 10 : step === 2 ? 40 : step === 3 ? 75 : 100;
            document.getElementById('progress').style.width = progress + '%';
            document.getElementById('truck-icon').style.left = progress + '%';
            document.getElementById('step-indicator').textContent = `Paso ${step} de 4`;
        }

        function setTemp(unit) {
            tempUnit = unit;
            const slider = document.getElementById('temp');
            document.getElementById('btn-c').style.background = unit === 'C' ? '#3b82f6' : 'rgba(255,255,255,0.1)';
            document.getElementById('btn-f').style.background = unit === 'F' ? '#3b82f6' : 'rgba(255,255,255,0.1)';

            if (unit === 'C') {
                slider.min = '-20';
                slider.max = '20';
                slider.value = '-18';
            } else {
                slider.min = '-5';
                slider.max = '60';
                slider.value = '0';
            }
            updateTempDisplay();
        }

        function updateTempDisplay() {
            const temp = document.getElementById('temp').value;
            const unit = tempUnit === 'C' ? '°C' : '°F';
            document.getElementById('tempDisplay').textContent = temp + unit;
        }

        document.getElementById('temp').addEventListener('input', updateTempDisplay);

        // Abrir calendar/time picker con un simple click en cualquier parte del campo
        document.querySelectorAll('input[type="date"], input[type="time"]').forEach(input => {
            input.addEventListener('click', function() {
                this.showPicker?.();
            });
        });

        document.getElementById('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.querySelector('button[type="submit"]');
            const errorDiv = document.getElementById('error');

            // Limpiar errores previos
            document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
            errorDiv.style.display = 'none';

            // Definir campos requeridos con nombres amigables
            const camposRequeridos = [
                { id: 'cliente', nombre: 'Empresa Cliente' },
                { id: 'solicitante', nombre: 'Nombre Solicitante' },
                { id: 'telefono', nombre: 'WhatsApp de Contacto' },
                { id: 'origen', nombre: 'Estado Origen' },
                { id: 'destino', nombre: 'Estado Destino' },
                { id: 'mercancia', nombre: 'Tipo de Mercancía' },
                { id: 'peso', nombre: 'Peso (Toneladas)' },
                { id: 'fecha', nombre: 'Fecha de Carga' },
                { id: 'hora', nombre: 'Hora de Carga' },
                { id: 'unidad', nombre: 'Tipo de Unidad' },
                { id: 'direccion_entrega', nombre: 'Dirección de Entrega' }
            ];

            // Validar campos
            const camposFaltantes = [];
            camposRequeridos.forEach(campo => {
                const elemento = document.getElementById(campo.id);
                const valor = elemento.value.trim();
                if (!valor) {
                    camposFaltantes.push(campo.nombre);
                    elemento.classList.add('input-error');
                }
            });

            // Si hay campos faltantes, mostrar popup modal
            if (camposFaltantes.length > 0) {
                const modalErrorList = document.getElementById('modal-error-list');
                modalErrorList.innerHTML = camposFaltantes
                    .map(campo => `<div style="padding: 8px 0; color: #fca5a5; font-size: 16px;">• ${campo}</div>`)
                    .join('');
                document.getElementById('modal-error').style.display = 'flex';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'ENVIANDO...';

            try {
                const folio = `SOL-${Date.now()}`;
                const hoy = new Date().toISOString().split('T')[0];
                const tempUnitStr = document.getElementById('btn-c').style.background.includes('#3b82f6') ? '°C' : '°F';

                const payload = {
                    folio: folio,
                    fecha_solicitud: hoy,
                    cliente_empresa: document.getElementById('cliente').value,
                    solicitante: document.getElementById('solicitante').value,
                    telefono_contacto: document.getElementById('telefono').value,
                    origen: document.getElementById('origen').value,
                    destino: document.getElementById('destino').value,
                    tipo_mercancia: document.getElementById('mercancia').value,
                    peso_aproximado: document.getElementById('peso').value,
                    temperatura_requerida: document.getElementById('temp').value + tempUnitStr,
                    requiere_refrigeracion: document.getElementById('temp').value !== "20" ? "SI" : "NO",
                    fecha_carga: document.getElementById('fecha').value,
                    hora_carga: document.getElementById('hora').value,
                    fecha_descarga: document.getElementById('fecha_descarga').value || null,
                    hora_descarga: document.getElementById('hora_descarga').value || null,
                    cita_descarga: document.getElementById('cita_descarga').value || null,
                    tipo_unidad: document.getElementById('unidad').value,
                    direccion_entrega: document.getElementById('direccion_entrega').value,
                    contacto_destino: document.getElementById('contacto_destino').value || null,
                    telefono_destino: document.getElementById('telefono_destino').value || null,
                    observaciones: document.getElementById('observaciones').value || null,
                    dias_operacion: 1,
                    km_cargados: 0,
                    monto_casetas: 0,
                    condiciones_pago: "A convenir",
                    tarifa_acordada: 0
                };

                // Enviar al Backend Orión MVP
                console.log('📤 Enviando al Backend Orión MVP...');
                const apiRes = await fetch(ORION_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!apiRes.ok) {
                    throw new Error(`Backend error: ${apiRes.status} ${apiRes.statusText}`);
                }

                const result = await apiRes.json();
                console.log('✅ Solicitud guardada en BD');

                // Mostrar éxito
                document.querySelector('.content').innerHTML = `
                        <div class="success-message">
                            <div class="success-icon">✅</div>
                            <h2 style="font-size: 20px; margin-bottom: 10px;">¡Solicitud Enviada!</h2>
                            <p style="font-size: 14px; margin-bottom: 20px;">Folio: <strong style="color: #10b981;">${folio}</strong></p>
                            <p style="font-size: 13px; opacity: 0.8; margin-bottom: 25px;">Orion Cryo ha recibido tu solicitud. Será revisada en breve.</p>
                            <button onclick="location.reload()" style="background: rgba(255,255,255,0.1); color: white; padding: 10px 30px;">Nueva Carga</button>
                        </div>
                    `;
            } catch (error) {
                console.error('❌ Error:', error);
                const errorDiv = document.getElementById('error');
                errorDiv.textContent = '❌ ' + error.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '✓ Confirmar Solicitud';
            }
        });
    </script>
</body>
</html>
