<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion Cryo | Portal de Carga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }
        .step-content {
            display: none;
        }
        .step-content.active {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        #truck-icon {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: absolute;
            top: -25px;
            margin-left: -20px;
        }
        .country-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        input[type="date"],
        input[type="time"] {
            color-scheme: dark;
            color: white !important;
            font-weight: 600;
        }
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="form-container" class="max-w-xl w-full bg-white/5 backdrop-blur-xl rounded-[2.5rem] shadow-2xl border border-white/10 overflow-hidden relative">
        <header class="p-8 text-center border-b border-white/5">
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase italic">Orion <span class="text-blue-500">Cryo</span></h1>
            <p class="text-white text-[10px] tracking-[0.3em] font-bold uppercase mt-1 opacity-90">Solicitud de Servicio</p>
        </header>

        <div class="relative w-full h-1 bg-white/10 mt-2">
            <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-500" style="width: 10%">
                <div id="truck-icon" style="left: 10%"><i data-lucide="truck" class="text-blue-400"></i></div>
            </div>
        </div>

        <form id="bookingForm" class="p-8">
            <!-- Step 1: Datos Cliente -->
            <div id="step1" class="step-content active">
                <div class="space-y-4">
                    <input type="text" id="cliente" required placeholder="Empresa Cliente" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white focus:border-blue-500">
                    <input type="text" id="solicitante" required placeholder="Nombre Solicitante" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white focus:border-blue-500">
                    <input type="tel" id="telefono" required placeholder="WhatsApp de Contacto" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white focus:border-blue-500">
                </div>
                <button type="button" onclick="goToStep(2)" class="w-full py-4 bg-blue-600 font-bold rounded-2xl mt-8 hover:bg-blue-700">Siguiente: Ruta</button>
            </div>

            <!-- Step 2: Ruta -->
            <div id="step2" class="step-content">
                <div class="space-y-6">
                    <p class="text-slate-300 text-sm font-semibold">📍 Ruta Nacional</p>
                    <div class="space-y-4">
                        <input list="states-list" id="origen" required placeholder="Estado Origen" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white focus:border-blue-500">
                        <input list="states-list" id="destino" required placeholder="Estado Destino" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white focus:border-blue-500">
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="goToStep(1)" class="w-1/3 py-4 bg-white/5 rounded-2xl">Atrás</button>
                    <button type="button" onclick="goToStep(3)" class="w-2/3 py-4 bg-blue-600 font-bold rounded-2xl">Siguiente: Carga</button>
                </div>
            </div>

            <!-- Step 3: Mercancía -->
            <div id="step3" class="step-content">
                <div class="space-y-4">
                    <input type="text" id="mercancia" required placeholder="Mercancía" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white focus:border-blue-500">
                    <input type="number" id="peso" required placeholder="Peso (Kg)" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white focus:border-blue-500">
                    <div class="bg-blue-600/10 p-5 rounded-3xl border border-blue-500/20">
                        <div class="flex gap-2 justify-center mb-3">
                            <button type="button" onclick="setTempUnit('C')" id="btn-celsius" class="country-btn active px-4 py-1 rounded-lg font-bold text-sm">°C</button>
                            <button type="button" onclick="setTempUnit('F')" id="btn-fahrenheit" class="country-btn px-4 py-1 rounded-lg font-bold text-sm text-slate-400">°F</button>
                        </div>
                        <div class="text-center">
                            <span id="tempDisplay" class="text-blue-400 font-black text-xl">-18°C</span>
                            <input type="range" id="temp" min="-20" max="20" value="-18" oninput="updateTemp(this.value)" class="w-full mt-2 accent-blue-500">
                            <p class="text-[10px] text-slate-400 mt-2">Rango: <span id="tempMin">-20</span>° a <span id="tempMax">20</span>°</p>
                        </div>
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="goToStep(2)" class="w-1/3 py-4 bg-white/5 rounded-2xl">Atrás</button>
                    <button type="button" onclick="goToStep(4)" class="w-2/3 py-4 bg-blue-600 font-bold rounded-2xl">Último paso</button>
                </div>
            </div>

            <!-- Step 4: Detalles Finales -->
            <div id="step4" class="step-content">
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase ml-2 text-blue-400 font-bold">Fecha Carga</label>
                            <input type="date" id="fecha" required class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl text-white outline-none focus:border-blue-500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase ml-2 text-blue-400 font-bold">Hora Carga</label>
                            <input type="time" id="hora" required class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl text-white outline-none focus:border-blue-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase ml-2 text-blue-400 font-bold">Fecha Descarga Esperada</label>
                            <input type="date" id="fecha_descarga" class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl text-white outline-none focus:border-blue-500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase ml-2 text-blue-400 font-bold">Hora Descarga Esperada</label>
                            <input type="time" id="hora_descarga" class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl text-white outline-none focus:border-blue-500">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] uppercase ml-2 text-blue-400 font-bold">¿Tiene Cita de Descarga?</label>
                        <input type="text" id="cita_descarga" placeholder="Ej: Sí, cita 14:00h" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white focus:border-blue-500">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] uppercase ml-2 text-blue-400 font-bold">Tipo de Unidad</label>
                        <select id="unidad" class="w-full p-4 bg-slate-800 border border-white/10 rounded-2xl text-white outline-none">
                            <option>ECO 03 (Refrigerado)</option>
                            <option>Full (Doble Remolque)</option>
                            <option>Sencillo (Seco)</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] uppercase ml-2 text-blue-400 font-bold">Dirección de Entrega</label>
                        <textarea id="direccion_entrega" required placeholder="Calle, número, ciudad, estado, código postal..." class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white focus:border-blue-500 resize-none h-20"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase ml-2 text-blue-400 font-bold">Contacto en Destino</label>
                            <input type="text" id="contacto_destino" placeholder="Nombre / Empresa" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white focus:border-blue-500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase ml-2 text-blue-400 font-bold">Teléfono Destino</label>
                            <input type="tel" id="telefono_destino" placeholder="+52 999 999 9999" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white focus:border-blue-500">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] uppercase ml-2 text-blue-400 font-bold">Solicitudes Adicionales / Notas Especiales</label>
                        <textarea id="observaciones" placeholder="Ej: Caja debe llegar enfriada, 8 gatas sujetadoras, requiere forro especial..." class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none text-white focus:border-blue-500 resize-none h-24"></textarea>
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="goToStep(3)" class="w-1/4 py-4 bg-white/5 rounded-2xl">Atrás</button>
                    <button type="submit" id="submitBtn" class="w-3/4 py-4 bg-green-600 font-black rounded-2xl uppercase text-white shadow-lg shadow-green-900/20 hover:bg-green-700">Confirmar Solicitud</button>
                </div>
            </div>
        </form>
    </div>

    <datalist id="states-list"></datalist>

    <script>
        lucide.createIcons();

        // ⭐ DETECCIÓN AUTOMÁTICA DEL BACKEND
        const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const ORION_API = isDev
            ? 'http://localhost:8001'
            : 'https://orion-mvp-524457029585.europe-west1.run.app';

        const API_URL = `${ORION_API}/api/solicitudes/recepcion-n8n`;

        const states = {
            MX: [
                "Aguascalientes", "Baja California", "Baja California Sur", "Campeche",
                "Chiapas", "Chihuahua", "Coahuila", "Colima", "CDMX", "Durango",
                "Guanajuato", "Guerrero", "Hidalgo", "Jalisco", "Estado de México",
                "Michoacán", "Morelos", "Nayarit", "Nuevo León", "Oaxaca", "Puebla",
                "Querétaro", "Quintana Roo", "San Luis Potosí", "Sinaloa", "Sonora",
                "Tabasco", "Tamaulipas", "Tlaxcala", "Veracruz", "Yucatán", "Zacatecas"
            ]
        };

        let currentTempUnit = 'C';

        function updateDatalist() {
            const list = document.getElementById('states-list');
            list.innerHTML = '';
            states['MX'].forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                list.appendChild(opt);
            });
        }
        updateDatalist();

        function setTempUnit(unit) {
            currentTempUnit = unit;
            document.getElementById('btn-celsius').classList.toggle('active', unit === 'C');
            document.getElementById('btn-celsius').classList.toggle('text-slate-400', unit !== 'C');
            document.getElementById('btn-fahrenheit').classList.toggle('active', unit === 'F');
            document.getElementById('btn-fahrenheit').classList.toggle('text-slate-400', unit !== 'F');

            const tempSlider = document.getElementById('temp');
            if (unit === 'C') {
                tempSlider.min = '-20';
                tempSlider.max = '20';
                tempSlider.value = '-18';
                document.getElementById('tempMin').innerText = '-20';
                document.getElementById('tempMax').innerText = '20';
            } else {
                tempSlider.min = '-5';
                tempSlider.max = '60';
                tempSlider.value = '0';
                document.getElementById('tempMin').innerText = '-5';
                document.getElementById('tempMax').innerText = '60';
            }
            updateTemp(tempSlider.value);
        }

        function updateTemp(v) {
            const unit = currentTempUnit === 'C' ? '°C' : '°F';
            document.getElementById('tempDisplay').innerText = v + unit;
        }

        function goToStep(s) {
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
            const progress = (s === 1 ? 10 : s === 2 ? 40 : s === 3 ? 75 : 100);
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('truck-icon').style.left = progress + '%';
        }

        document.getElementById('bookingForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            try {
                // Generar folio automático
                const folio = `SOL-${Date.now()}`;
                const hoy = new Date().toISOString().split('T')[0];

                // Mapear campos al formato que espera el backend
                const tempUnit = currentTempUnit === 'C' ? '°C' : '°F';
                const payload = {
                    folio: folio,
                    fecha_solicitud: hoy,
                    cliente_empresa: document.getElementById('cliente').value,
                    solicitante: document.getElementById('solicitante').value,
                    telefono_contacto: document.getElementById('telefono').value,
                    origen: document.getElementById('origen').value,
                    destino: document.getElementById('destino').value,
                    fecha_carga: document.getElementById('fecha').value,
                    hora_carga: document.getElementById('hora').value,
                    fecha_descarga: document.getElementById('fecha_descarga').value || null,
                    hora_descarga: document.getElementById('hora_descarga').value || null,
                    cita_descarga: document.getElementById('cita_descarga').value || null,
                    direccion_entrega: document.getElementById('direccion_entrega').value,
                    contacto_destino: document.getElementById('contacto_destino').value || null,
                    telefono_destino: document.getElementById('telefono_destino').value || null,
                    dias_operacion: 1,
                    km_cargados: 0,
                    tipo_mercancia: document.getElementById('mercancia').value,
                    requiere_refrigeracion: document.getElementById('temp').value !== "20" ? "SI" : "NO",
                    temperatura_requerida: document.getElementById('temp').value + tempUnit,
                    peso_aproximado: document.getElementById('peso').value,
                    tipo_unidad: document.getElementById('unidad').value,
                    monto_casetas: 0,
                    condiciones_pago: "A convenir",
                    tarifa_acordada: 0,
                    observaciones: document.getElementById('observaciones').value
                };

                // Enviar al backend Orión
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();

                // ✅ Éxito - Mostrar confirmación
                document.getElementById('form-container').innerHTML = `
                    <div class="p-12 text-center">
                        <i data-lucide="check-circle" class="w-16 h-16 text-green-500 mx-auto mb-6"></i>
                        <h2 class="text-2xl font-bold text-white uppercase tracking-tight mb-4">¡Solicitud Enviada!</h2>
                        <p class="text-slate-400 text-sm mb-2">Folio: <strong class="text-green-400">${result.folio}</strong></p>
                        <p class="text-slate-400 text-sm mb-8">Orion Cryo ha recibido tu solicitud. Será revisada en breve.</p>
                        <button onclick="location.reload()" class="px-8 py-3 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition-all">Nueva Carga</button>
                    </div>`;
                lucide.createIcons();

            } catch (error) {
                console.error("Error:", error);
                alert(`Error al enviar: ${error.message}\n\nBackend: ${API_URL}`);
                btn.disabled = false;
                btn.innerText = "Confirmar Solicitud";
            }
        };
    </script>
</body>
</html>
